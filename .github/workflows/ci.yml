name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CI dependencies
        run: pip install ruff pytest numpy pandas scikit-learn joblib PyYAML

      - name: Ruff — lint
        run: ruff check site_sentinel/ tests/

      - name: Ruff — format check
        run: ruff format --check site_sentinel/ tests/

      - name: Pytest
        env:
          SITE_SENTINEL_SKIP_MODEL: "true"
        run: pytest tests/ -v --tb=short
